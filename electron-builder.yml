appId: com.gunnmilesllc.ffa-transcript-db
productName: FFA Transcript Database
copyright: Copyright © 2026 Gunn Miles LLC

directories:
  buildResources: build
  output: _dist

files:
  - dist/**/*
  - server/**/*
  - electron/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,LICENSE,license,*.test.js,*.spec.js,test/**}"
  - "!**/node_modules/.cache"
  - "!**/.{git,vscode,idea}"
  - "!**/{.eslintrc.json,.prettierrc,.gitignore,.npmignore}"

# Bundle Puppeteer's downloaded Chromium (cached at the standard location).
# This is the runtime browser the scraper uses; without it scrape doesn't work.
extraResources:
  - from: "/Users/wmiles49/.cache/puppeteer"
    to: "puppeteer-cache"
    filter:
      - "**/*"

asarUnpack:
  - "node_modules/better-sqlite3-multiple-ciphers/**/*"
  - "node_modules/@ffmpeg-installer/**/*"

mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
  identity: "WILLIAM MILES (76R466YDPC)"
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  notarize: false

win:
  target:
    - target: nsis
      arch:
        - x64
  # No code signing in this PR — Apple Developer ID does not work for Windows.
  # Users will see SmartScreen "unknown publisher" warning on first run.
  # Future: get an Authenticode cert (~$200/yr) and set 'sign:' here.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "FFA Transcript Database"

linux:
  category: Education
  target:
    - target: AppImage
      arch:
        - x64
  # AppImages are sandbox-friendly executables. No signing needed; users mark
  # the .AppImage executable and double-click.

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

publish: null
